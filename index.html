<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Bank</title>

  <!-- PENTING: LINK CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <h1>CEO Bank</h1>
    <p>Transfer Instan</p>
  </div>

  <div class="content">

    <!-- CARD SALDO -->
    <div class="card saldo">
      <p>Saldo Anda</p>
      <h2 id="saldo">Rp 999.999.999</h2>
    </div>

    <!-- FORM TRANSFER -->
    <div id="pageForm" class="card form">

      <label>Nomor Rekening</label>
      <input type="text" id="rekening" placeholder="Masukkan nomor rekening">

      <label>Nama Penerima</label>
      <input type="text" id="nama" placeholder="Nama penerima">

      <label>Bank Tujuan</label>
      <select id="bank">
        <option>BCA</option>
        <option>BRI</option>
        <option>BNI</option>
        <option>Mandiri</option>
      </select>

      <label>Nominal Transfer</label>
      <input type="number" id="nominal" placeholder="Masukkan nominal">

      <button onclick="mulaiTransfer()">Transfer</button>

      <p id="status"></p>
    </div>

  </div>
</div>

<!-- POPUP LOADING -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="loadingText">Memproses...</p>
  </div>
</div>

<!-- HALAMAN STRUK -->
<div id="pageStruk" class="phone hidden">

  <div class="content">

    <div class="card success">
      <h2>✔ Transfer Berhasil</h2>
      <div id="strukDetail"></div>
    </div>

    <div class="card">
      <h3>Riwayat Transfer</h3>
      <div id="riwayat"></div>
    </div>

  </div>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
