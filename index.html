<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Bank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

  <div class="header">
    CEO Bank
  </div>

  <div class="content">

    <div class="card saldo">
      <p>Saldo Tersedia</p>
      <h2>Rp 9.999.999.999</h2>
      <span>∞ Unlimited</span>
    </div>

    <h3>Transfer Instan</h3>

    <div class="form">

      <label>Nomor Rekening</label>
      <input id="rekening" placeholder="Contoh: 1234567890">

      <label>Nama Penerima</label>
      <input id="nama" placeholder="Nama penerima">

      <label>Bank Tujuan</label>
      <select id="bank">
        <option>BCA</option>
        <option>BRI</option>
        <option>BNI</option>
        <option>Mandiri</option>
      </select>

      <label>Nominal Transfer</label>
      <input id="nominal" type="number" placeholder="Contoh: 1000000">

      <button onclick="mulaiTransfer()">Transfer Sekarang</button>

    </div>

    <!-- PROGRESS -->
    <div id="progressBox" class="card hidden">
      <h3>Memproses Transfer</h3>
      <p id="progressText">Menghubungi server...</p>
    </div>

    <!-- SUCCESS -->
    <div id="successBox" class="card hidden success">
      <h3>✅ Transfer Berhasil</h3>
      <p id="detail"></p>
      <button onclick="reset()">Selesai</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
