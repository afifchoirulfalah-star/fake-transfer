<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Mobile Banking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <h2>CEO Bank</h2>
    <p>Transfer Instan</p>
  </div>

  <div class="card">
    <label>Nomor Rekening</label>
    <input type="text" id="rekening" placeholder="Contoh: 1234567890">

    <label>Nominal Transfer</label>
    <input type="number" id="nominal" placeholder="Contoh: 1000000">

    <button onclick="prosesTransfer()">Transfer</button>

    <p id="status"></p>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3>✅ Transfer Berhasil</h3>
    <p id="popupText"></p>
    <button onclick="tutupPopup()">Tutup</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
